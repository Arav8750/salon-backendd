spring.application.name=smart-salon-backend

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update


# JPA / Hibernate
# Use 'validate' since we create tables via SQL script ourselves
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=SmartSalonJWTSecretKey2024VeryLongAndSecureKeyForHMACSHA256Algorithm
jwt.expiration=86400000

# Server Port
server.port=8080

# Logging
logging.level.com.salon=DEBUG
logging.level.org.springframework.security=INFO

# HuggingFace API
huggingface.api.url=https://router.huggingface.co/v1/chat/completions
